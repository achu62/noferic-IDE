<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Monaco IDE</title>
  <style>
    @font-face {
      font-family: "JetBrains Mono";
      src: url("fonts/JetBrainsMono/fonts/webfonts/JetBrainsMono-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: "JetBrains Mono";
      src: url("fonts/JetBrainsMono/fonts/webfonts/JetBrainsMono-Italic.woff2") format("woff2");
      font-weight: 400;
      font-style: italic;
    }
    @font-face {
      font-family: "JetBrains Mono";
      src: url("fonts/JetBrainsMono/fonts/webfonts/JetBrainsMono-Bold.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: "JetBrains Mono";
      src: url("fonts/JetBrainsMono/fonts/webfonts/JetBrainsMono-BoldItalic.woff2") format("woff2");
      font-weight: 700;
      font-style: italic;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "JetBrains Mono";
      font-feature-settings: 'liga' 1;
    }

    #editor {
      position: fixed;
      inset: 0; /* top:0; right:0; bottom:0; left:0; */
      width: auto;
      height: auto;
      pointer-events: auto; /* critical */
    }
  </style>
</head>
<body>
  <div id="editor"></div>
  <script src="monaco-editor/package/min/vs/loader.js"></script>
   <!-----<script src="libs/lint.js" type="module"></script>--->
  <script src="script.js"  type="module">
   
  </script>

</body>
</html>
